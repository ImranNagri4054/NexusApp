<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Current Issue</title>
    <!-- <link rel="stylesheet" href="current.css"> -->
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div id="header"></div>
    <main id="page-content">
    <!-- main current section start from here  -->
    <section id="current-section" class="current-section">
        <div class="current-container">

            <header class="current-header">
                <h2 class="current-title" id="current-title">Current Issue</h2>
                <p class="current-subtitle" id="current-subtitle">
                    Browse the latest published articles.
                </p>
            </header>

            <div class="current-card" id="current-card">

                <div class="current-volume-box">
                    <h3 class="current-vol" id="current-vol">Vol. –</h3>
                    <p class="current-issue" id="current-issue-label">Issue –</p>
                    <span class="current-date" id="current-date-label">–</span>
                </div>

                <div class="current-content">
                    <h3 class="current-journal-title" id="current-journal-title">
                        The Nexus Journal of Research and Innovation
                    </h3>

                    <p class="current-description" id="current-description">
                        Latest peer-reviewed articles will appear here.
                    </p>

                    <div class="current-actions">
                        <button class="current-btn primary" id="current-pdf-btn" style="display:none;">
                            ⬇ Download Complete Issue (PDF)
                        </button>
                        <button class="current-btn secondary" id="current-toc-btn">
                            View Table of Contents
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </section>
    <!-- dynamic article cards for current issue -->
    <section id="comCard-section">
        <div id="current-articles"></div>
        </main>
    </section>
    <div id="footer"></div>
    <script src="./header.js"></script>
    <script src="./footer.js"></script>
    <script>
        (function () {
            var titleEl = document.getElementById('current-title');
            var subtitleEl = document.getElementById('current-subtitle');
            var volEl = document.getElementById('current-vol');
            var issueEl = document.getElementById('current-issue-label');
            var dateEl = document.getElementById('current-date-label');
            var descEl = document.getElementById('current-description');
            var pdfBtn = document.getElementById('current-pdf-btn');
            var tocBtn = document.getElementById('current-toc-btn');
            var articlesContainer = document.getElementById('current-articles');

            // Fetch all issues and render them using the original card UI
            fetch('/api/issues')
                .then(function (res) { return res.json(); })
                .then(function (issues) {
                    if (!Array.isArray(issues) || issues.length === 0) {
                        if (articlesContainer) {
                            articlesContainer.innerHTML = '<p style="text-align: center; font-size: 1.2rem; font-weight: 600; color: #64748b;">No issues have been created yet.</p>';
                        }
                        return;
                    }

                    // Use the first issue as the "current" header
                    var current = issues[0];
                    if (volEl) volEl.textContent = 'Vol. ' + current.volume;
                    if (issueEl) issueEl.textContent = 'Issue ' + current.issueNumber;
                    if (dateEl) dateEl.textContent = (current.month || '') + ' ' + (current.year || '');
                    if (titleEl) titleEl.textContent = 'Current Issue – Vol. ' + current.volume + ', Issue ' + current.issueNumber;
                    if (subtitleEl) subtitleEl.textContent = 'Browse the latest published articles in ' + (current.month || '') + ' ' + (current.year || '');
                    if (descEl && current.description) descEl.textContent = current.description;
                    if (pdfBtn && current.pdfUrl) {
                        pdfBtn.style.display = 'inline-block';
                        pdfBtn.addEventListener('click', function () {
                            window.open(current.pdfUrl, '_blank');
                        });
                    }

                    // Render all issues as cards below
                    if (!articlesContainer) return;
                    articlesContainer.innerHTML = '';

                    issues.forEach(function (issue) {
                        var card = document.createElement('div');
                        card.className = 'comCard';

                        var header = document.createElement('div');
                        header.className = 'comCard-header';

                        var tag = document.createElement('span');
                        tag.className = 'comCard-tag';
                        tag.textContent = 'Vol. ' + issue.volume;

                        var pages = document.createElement('span');
                        pages.className = 'comCard-pages';
                        pages.textContent = issue.month + ' ' + issue.year;

                        header.appendChild(tag);
                        header.appendChild(pages);

                        var title = document.createElement('h2');
                        title.className = 'comCard-title';
                        title.textContent = 'Issue ' + issue.issueNumber + ' – ' + (issue.month || '') + ' ' + (issue.year || '');

                        var authors = document.createElement('div');
                        authors.className = 'comCard-authors';
                        authors.innerHTML = '<span class="comCard-icon">📘</span><span>' + (issue.journalTitle || 'The Nexus Journal of Research and Innovation') + '</span>';

                        var desc = document.createElement('p');
                        desc.className = 'comCard-desc';
                        var text = issue.description || 'Articles assigned to this issue will appear in the table of contents.';
                        desc.textContent = text;

                        var footer = document.createElement('div');
                        footer.className = 'comCard-footer';

                        var meta = document.createElement('span');
                        meta.className = 'comCard-doi';
                        meta.textContent = '';

                        var actions = document.createElement('div');
                        actions.className = 'comCard-actions';

                        var tocBtnLocal = document.createElement('button');
                        tocBtnLocal.className = 'comCard-btn outline';
                        tocBtnLocal.textContent = 'View Articles';
                        tocBtnLocal.addEventListener('click', function () {
                            window.location.href = '/issue.html?id=' + encodeURIComponent(issue._id);
                        });

                        actions.appendChild(tocBtnLocal);

                        footer.appendChild(meta);
                        footer.appendChild(actions);

                        card.appendChild(header);
                        card.appendChild(title);
                        card.appendChild(authors);
                        card.appendChild(desc);
                        card.appendChild(footer);

                        articlesContainer.appendChild(card);
                    });
                })
                .catch(function () {
                    if (articlesContainer) {
                        articlesContainer.innerHTML = '<p style="text-align: center; font-size: 1.2rem; font-weight: 600; color: #64748b;">Unable to load issues.</p>';
                    }
                });
        })();
    </script>
</body>

<style>
    body {
        background-color: #eef3ff;
        font-family: system-ui, sans-serif;
    }
</style>

</html>
