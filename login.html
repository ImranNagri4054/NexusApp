<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="./tbar.css">
</head>

<body>
    <div id="header"></div>
    <main id="space">

        <section class="log-wrapper" style="padding-top: 230px;">
            <div class="log-card">

                <div class="log-icon">📘</div>

                <h2 class="log-title">Welcome Back</h2>
                <p class="log-subtitle">
                    Log in to access your author dashboard and manage your submissions
                </p>

                <form class="log-form" id="logForm">

                    <h3 class="log-form-title">Sign In to Your Account</h3>

                    <div class="log-field">
                        <label>Email Address</label>
                        <input type="email" id="logEmail" placeholder="your.email@university.edu">
                    </div>

                    <div class="log-field">
                        <label>Password</label>
                        <input type="password" id="logPassword" placeholder="Enter your password">
                    </div>

                    <div class="log-options">
                        <label>
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="#">Forgot password?</a>
                    </div>

                    <button type="submit" class="log-btn">Sign In</button>

                    <div class="log-divider">
                        <span>Or continue with</span>
                    </div>

                    <div class="log-social">
                        <button
                            type="button"
                            class="log-social-btn log-google-btn"
                            aria-label="Sign in with Google"
                        >
                            <!-- Simple Google-style button -->
                            <span class="log-social-icon">G</span>
                            <span class="log-social-text">Sign in with Google</span>
                        </button>
                        <button
                            type="button"
                            class="log-social-btn log-github-btn"
                            aria-label="Sign in with GitHub"
                        >
                            <span class="log-social-icon"></span>
                            <span class="log-social-text">Sign in with GitHub</span>
                        </button>
                    </div>

                    <p class="log-footer">
                        Don’t have an account? <a href="./register.html">Sign up here</a>
                    </p>

                </form>

                <button class="log-support">
                    Having trouble signing in? <strong>Contact support</strong>
                </button>

            </div>
        </section>
    </main>
    <div id="footer"></div>

    <!-- footer section -->


    <script src="./app.js"></script>
    <script src="./footer.js"></script>
    <script src="./header.js"></script>

    <script>
        (function () {
            const form = document.getElementById('logForm');
            if (!form) return;

            form.addEventListener('submit', async function (e) {
                e.preventDefault();

                const email = document.getElementById('logEmail').value.trim();
                const password = document.getElementById('logPassword').value;

                if (!email || !password) {
                    alert('Please enter email and password.');
                    return;
                }

                try {
                    const res = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({ email, password })
                    });

                    const data = await res.json().catch(() => ({}));

                    if (!res.ok) {
                        alert(data.message || 'Login failed.');
                        return;
                    }

                    // logged in successfully
                    window.location.href = '/';
                } catch (err) {
                    console.error(err);
                    alert('Network error while logging in.');
                }
            });

            // Social login buttons (Google / GitHub)
            const socialButtons = document.querySelectorAll('.log-social button');
            if (socialButtons[0]) {
                socialButtons[0].addEventListener('click', function () {
                    window.location.href = '/api/auth/google';
                });
            }
            if (socialButtons[1]) {
                socialButtons[1].addEventListener('click', function () {
                    window.location.href = '/api/auth/github';
                });
            }
        })();
    </script>

</body>

</html>
